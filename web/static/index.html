<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Daily Review</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
  :root {
    --done-color: #22c55e;
    --unfinished-color: #ef4444;
    --unclassified-color: #a78bfa;
    --bg: #0f172a;
    --card-bg: #1e293b;
    --text: #f1f5f9;
    --subtext: #94a3b8;
    --border: #334155;
    --approve-bg: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding: 16px; min-height: 100vh; }
  h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
  .date { font-size: 0.85rem; color: var(--subtext); margin-bottom: 20px; }
  .section-header { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--subtext); margin: 20px 0 8px; }
  .bucket-label { font-size: 0.8rem; font-weight: 600; margin-bottom: 6px; padding: 4px 8px; border-radius: 6px; display: inline-block; }
  .bucket-done .bucket-label { background: rgba(34,197,94,0.15); color: var(--done-color); }
  .bucket-unfinished .bucket-label { background: rgba(239,68,68,0.15); color: var(--unfinished-color); }
  .bucket-unclassified .bucket-label { background: rgba(167,139,250,0.15); color: var(--unclassified-color); }
  .bucket { min-height: 48px; border: 1px dashed var(--border); border-radius: 10px; padding: 8px; margin-bottom: 12px; }
  .bucket.drag-over { border-color: var(--approve-bg); background: rgba(59,130,246,0.05); }
  .task-card { background: var(--card-bg); border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: grab; display: flex; align-items: flex-start; gap: 8px; }
  .task-card:active { cursor: grabbing; }
  .task-card .drag-handle { color: var(--subtext); flex-shrink: 0; margin-top: 2px; font-size: 1rem; }
  .task-card .task-name { flex: 1; font-size: 0.9rem; outline: none; border: none; background: transparent; color: var(--text); resize: none; font-family: inherit; line-height: 1.4; }
  .task-card .task-name:focus { text-decoration: underline; text-decoration-color: var(--approve-bg); }
  .task-card .delete-btn { color: var(--subtext); background: none; border: none; cursor: pointer; font-size: 1rem; padding: 0 2px; flex-shrink: 0; }
  .plan-project { margin-bottom: 16px; }
  .plan-project h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .plan-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--card-bg); border-radius: 8px; margin-bottom: 6px; }
  .plan-item input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 0.9rem; outline: none; font-family: inherit; }
  .plan-item input:focus { text-decoration: underline; text-decoration-color: var(--approve-bg); }
  .plan-item .delete-btn { color: var(--subtext); background: none; border: none; cursor: pointer; font-size: 1rem; }
  .add-task-btn { background: none; border: 1px dashed var(--border); color: var(--subtext); border-radius: 8px; padding: 6px 12px; font-size: 0.8rem; cursor: pointer; width: 100%; margin-top: 4px; }
  .add-task-btn:hover { border-color: var(--approve-bg); color: var(--approve-bg); }
  .approve-bar { position: sticky; bottom: 0; background: var(--bg); padding: 16px 0 8px; margin-top: 24px; }
  .approve-btn { width: 100%; background: var(--approve-bg); color: white; border: none; border-radius: 12px; padding: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .approve-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .approve-btn.success { background: var(--done-color); }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; font-size: 0.85rem; white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .loading { text-align: center; padding: 40px; color: var(--subtext); }
</style>
</head>
<body>
<h1>Daily Review</h1>
<div class="date" id="date-label">Loading…</div>

<div id="app" style="display:none">
  <!-- Daily Review -->
  <div class="section-header">Today's Summary</div>

  <div class="bucket-done">
    <div class="bucket-label">✅ Done</div>
    <div class="bucket" id="bucket-done"></div>
  </div>
  <div class="bucket-unfinished">
    <div class="bucket-label">❌ Unfinished</div>
    <div class="bucket" id="bucket-unfinished"></div>
  </div>
  <div class="bucket-unclassified">
    <div class="bucket-label">💡 Unclassified</div>
    <div class="bucket" id="bucket-unclassified"></div>
  </div>

  <!-- Tomorrow's Plan -->
  <div class="section-header">Tomorrow's Plan</div>
  <div id="plan-section"></div>

  <div class="approve-bar">
    <button class="approve-btn" id="approve-btn" onclick="approve()">Approve & Save to Notion</button>
  </div>
</div>

<div class="loading" id="loading">Loading…</div>
<div class="toast" id="toast"></div>

<script>
const date = location.pathname.split('/').pop();
let state = { classification: null, plan: [] };

document.getElementById('date-label').textContent = date;

async function load() {
  try {
    const r = await fetch(`/api/review/${date}`);
    if (!r.ok) throw new Error(await r.text());
    const data = await r.json();
    state.classification = data.classification;
    state.plan = data.plan || [];
    render();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch (e) {
    document.getElementById('loading').textContent = 'Error loading data: ' + e.message;
  }
}

function makeTaskCard(task, bucket) {
  const card = document.createElement('div');
  card.className = 'task-card';
  card.dataset.taskName = task.task_name || task.suggested_name || '';
  card.dataset.taskJson = JSON.stringify(task);
  card.innerHTML = `
    <span class="drag-handle">⠿</span>
    <textarea class="task-name" rows="1">${card.dataset.taskName}</textarea>
    <button class="delete-btn" onclick="this.closest('.task-card').remove()">✕</button>
  `;
  const ta = card.querySelector('textarea');
  ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; });
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
  return card;
}

function render() {
  const c = state.classification;
  const buckets = { done: 'bucket-done', unfinished: 'bucket-unfinished', unclassified: 'bucket-unclassified' };
  const dataKeys = { done: c.done || [], unfinished: c.unfinished || [], unclassified: c.unclassified || c.unclassified_activities || [] };

  for (const [key, elId] of Object.entries(buckets)) {
    const el = document.getElementById(elId);
    el.innerHTML = '';
    for (const task of dataKeys[key]) el.appendChild(makeTaskCard(task, key));
    Sortable.create(el, { group: 'tasks', animation: 150, handle: '.drag-handle' });
  }

  // Tomorrow's plan grouped by project
  const planSection = document.getElementById('plan-section');
  planSection.innerHTML = '';
  const byProject = {};
  for (const item of state.plan) {
    const proj = item.project || 'Other';
    if (!byProject[proj]) byProject[proj] = [];
    byProject[proj].push(item);
  }
  for (const [proj, items] of Object.entries(byProject)) {
    const div = document.createElement('div');
    div.className = 'plan-project';
    div.dataset.project = proj;
    div.innerHTML = `<h3>${proj}</h3>`;
    for (const item of items) {
      const row = document.createElement('div');
      row.className = 'plan-item';
      row.innerHTML = `<input type="text" value="${item.task || ''}" data-priority="${item.priority || 'medium'}" data-context="${item.context || ''}"><button class="delete-btn" onclick="this.closest('.plan-item').remove()">✕</button>`;
      div.appendChild(row);
    }
    const addBtn = document.createElement('button');
    addBtn.className = 'add-task-btn';
    addBtn.textContent = '+ Add task';
    addBtn.onclick = () => {
      const row = document.createElement('div');
      row.className = 'plan-item';
      row.innerHTML = `<input type="text" placeholder="New task…" data-priority="medium" data-context=""><button class="delete-btn" onclick="this.closest('.plan-item').remove()">✕</button>`;
      div.insertBefore(row, addBtn);
      row.querySelector('input').focus();
    };
    div.appendChild(addBtn);
    planSection.appendChild(div);
  }
}

function collectState() {
  const readBucket = (id, originalItems) => {
    return Array.from(document.getElementById(id).querySelectorAll('.task-card')).map((card, i) => {
      const name = card.querySelector('textarea').value.trim();
      const orig = JSON.parse(card.dataset.taskJson || '{}');
      return { ...orig, task_name: name, suggested_name: name };
    });
  };
  const classification = {
    ...state.classification,
    done: readBucket('bucket-done'),
    unfinished: readBucket('bucket-unfinished'),
    unclassified: readBucket('bucket-unclassified'),
  };
  const plan = [];
  let id = 1;
  for (const projDiv of document.querySelectorAll('.plan-project')) {
    const proj = projDiv.dataset.project;
    for (const row of projDiv.querySelectorAll('.plan-item')) {
      const val = row.querySelector('input').value.trim();
      if (val) plan.push({ id: id++, task: val, project: proj, priority: row.querySelector('input').dataset.priority || 'medium', context: row.querySelector('input').dataset.context || '' });
    }
  }
  return { classification, plan };
}

async function approve() {
  const btn = document.getElementById('approve-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const body = collectState();
    const r = await fetch(`/api/review/${date}/approve`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) throw new Error(await r.text());
    btn.textContent = '✓ Saved!';
    btn.classList.add('success');
    showToast('Saved to Notion. Telegram confirmation sent.');
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Approve & Save to Notion';
    showToast('Error: ' + e.message);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

load();
</script>
</body>
</html>
