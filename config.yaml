# ── Telegram ───────────────────────────────────────────────────────────────────
telegram_bot_token: "8944063258:AAFde4YCBs5SQuzO81RBTVbs_Ss9A8I65Cc"          # from @BotFather
telegram_chat_id: "972428891"            # your personal chat ID (get from @userinfobot)

# ── Paths ──────────────────────────────────────────────────────────────────────
typing_log_dir: "~/typing-logs"
plans_dir: "~/.daily-agent/plans"
learning_dir: "~/.daily-agent/learning"
learning_few_shot_count: 5      # how many past days to inject as examples
learning_enabled: true
agent_log_dir: "~/daily-agent/logs"
pending_dir: "~/.daily-agent/pending"     # failed runs saved here for retry

# Debug pipeline trace (pipeline/daily_trace.py)
summarization_prompts_dir: "summarization_prompts"   # repo-relative; YYYY-MM-DD.md per run
debug_trace_enabled: true
debug_trace_max_list_items: 50
debug_trace_max_aw_events: 100
debug_trace_max_section_chars: 30000

# ── ActivityWatch ──────────────────────────────────────────────────────────────
activitywatch_host: "http://localhost:5600"
activitywatch_hostname: ""                # leave empty to auto-detect from API

# ── Schedule ───────────────────────────────────────────────────────────────────
run_hour: 20                              # 8 PM
timezone: "Asia/Jerusalem"                # your local timezone (pytz-compatible)

# ── Typing Log Filtering ───────────────────────────────────────────────────────

# Apps to COMPLETELY IGNORE — security sensitive
typing_ignore_bundle_ids:
  - "com.apple.keychainaccess"
  - "com.1password.1password"
  - "com.agilebits.onepassword7"
  - "net.aggimenez.Proxyman"
  - "com.apple.Terminal"               # may contain secrets — review before removing
  - "com.googlecode.iterm2"            # same

# Minimum text length to keep (filters accidental single keystrokes)
typing_min_length: 15

# Deduplication window in seconds (same app + same text within window = one entry)
typing_dedup_window_seconds: 300

# Apps with FULL text capture (LLMs, writing apps)
typing_deep_apps:
  - bundle_id: "com.google.Chrome"
    mode: "domain_filter"
    domains:
      - "claude.ai"
      - "chat.openai.com"
      - "gemini.google.com"
      - "aistudio.google.com"
      - "chatgpt.com"
  - bundle_id: "com.apple.Safari"
    mode: "domain_filter"
    domains:
      - "claude.ai"
      - "chat.openai.com"
      - "gemini.google.com"
  - bundle_id: "com.todesktop.230313mzl4w4u92"  # Cursor IDE
    mode: "full"
  - bundle_id: "com.apple.Notes"
    mode: "full"
  - bundle_id: "com.microsoft.Word"
    mode: "summary"                    # char-count + first 100 chars
  - bundle_id: "com.microsoft.Powerpoint"
    mode: "summary"
  - bundle_id: "io.claude.app"         # Claude desktop app
    mode: "full"
  - bundle_id: "com.anthropic.claudefordesktop"  # Claude desktop (current bundle id)
    mode: "full"

# Apps with SUMMARY only (we know what they are, don't need text)
typing_summary_only_apps:
  - "com.notion.mac"                   # content already in Notion DB
  - "com.tinyspeck.slackmacgap"        # Slack — not needed
  - "com.readdle.smartemail"
  - "com.apple.mail"

# All other apps: char-count only (used for pie chart only)

# ── Token Budget Limits ─────────────────────────────────────────────────────────
max_synthesis_tokens: 12000            # --compress flag threshold: if the assembled prompt exceeds
                                      # this, second-pass compression fires (3 bullets per section).
max_tokens_per_source: 8000           # per-source safety limit; blobs above this get a haiku
                                      # compression pass before entering the main synthesis prompt.
                                      # Applies to: meeting summaries, general context page.
                                      # Cursor sessions are compressed separately by Stage 1A.
                                      # Typing entries are budget-managed by the timeline cascade.
max_typing_tokens: 2500               # truncate typing entries if over this
max_cursor_tokens: 1000               # truncate Cursor sessions if over this
max_meeting_tokens: 800               # truncate meeting summaries if over this
max_context_tokens: 600               # truncate context page if over this

# ── Telegram Message ────────────────────────────────────────────────────────────
telegram_max_chars: 4000              # split message if longer (Telegram limit: 4096)
