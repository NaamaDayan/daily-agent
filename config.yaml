# daily-agent/config.yaml
# chmod 600 this file after filling in keys

# ── Anthropic ──────────────────────────────────────────────────────────────────
anthropic_api_key: "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"
anthropic_model: "claude-sonnet-4-6"
anthropic_max_tokens: 2500
anthropic_cursor_presummary_model: "claude-haiku-4-5-20251001"  # cheaper model for Stage 1A
anthropic_cursor_presummary_max_tokens: 200


# Classification thresholds (pipeline/classifier.py)
classification_done_threshold: 0.80    # confidence >= this → done
classification_min_threshold: 0.40    # confidence < this → not classified at all

# Activity namer clustering (pipeline/activity_namer.py)
activity_cluster_gap_minutes: 5       # max gap to merge same-app segments
activity_cluster_keyword_overlap: 2   # min shared keywords to merge across apps
activity_naming_max_tokens: 2000      # cap for activity_namer LLM output

# Summarizer pipeline settings
min_segment_minutes: 3            # AW segments shorter than this are dropped from timeline
max_timeline_tokens: 3000         # hard cap on the timeline section of the main prompt
max_typing_per_segment: 6         # max typing entries shown per timeline segment

# ── Notion ─────────────────────────────────────────────────────────────────────
notion_api_key: "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"
notion_meetings_db_id: "cbed3950ad73499d88441be4f7e21286"       # Research DB — pages with Type=Conversation
notion_context_page_id: "36f9c344ad2d809caa65cffb353a1ad3"      # 32-char ID from your Agent Context page URL
notion_tasks_db_id: "4f4025aa-2b3e-408b-8501-bfb0c6e8f8d0"      # Tasks database   (page ID from URL)
notion_projects_db_id: "6f9aceae-1b02-4340-b994-0df170b57633"   # Projects database (page ID from URL)


# Notion meetings DB filter settings
notion_meetings_type_filter: "Conversation"  # exact value of the "Type" property to match
notion_sikhum_heading: "סיכום"               # heading marking start of summary section
notion_transcript_heading: "תמלול מלא"       # heading marking start of transcript (stop here)

